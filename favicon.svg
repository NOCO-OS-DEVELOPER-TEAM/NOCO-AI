<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="NOCO AI">
  <defs>
    <linearGradient id="nocoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="48%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="9" fill="url(#nocoGrad)" filter="url(#glow)"/>
  <rect x="3" y="3" width="26" height="26" rx="7" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>
  <text x="16" y="13.5" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-weight="800" font-size="5.5" fill="rgba(0,0,0,0.78)">NO</text>
  <text x="16" y="20.5" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-weight="800" font-size="5.5" fill="rgba(0,0,0,0.78)">CO</text>
  <circle cx="25" cy="7" r="2" fill="#fff" opacity="0.95"/>
</svg>
